<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigator — 旅遊行程應變系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <span class="logo-icon">&#9708;</span>
      <span class="logo-text">Navigator</span>
      <span class="logo-sub">旅遊行程應變系統</span>
    </header>

    <div class="layout">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-title">旅遊資料</div>
        <form id="travelForm">
          <div class="field">
            <label for="destination">目的地</label>
            <input type="text" id="destination" placeholder="例：京都、台南、峇里島" required>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="days">天數</label>
              <input type="number" id="days" min="1" max="30" placeholder="天" required>
            </div>
            <div class="field">
              <label for="people">人數</label>
              <input type="number" id="people" min="1" value="5" required>
            </div>
          </div>
          <div class="field">
            <label for="preferences">偏好與限制</label>
            <textarea id="preferences" placeholder="例：不吃辣、偏好室內、省錢、有老人" rows="3"></textarea>
          </div>
          <button type="submit" id="startBtn">開始規劃</button>
        </form>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area">
        <!-- Incident quick buttons -->
        <div class="incident-bar">
          <span class="incident-bar-label">模擬突發狀況</span>
          <button class="incident-btn" data-msg="突發大雨，請根據目前行程提供應變備案">⛈ 突發大雨</button>
          <button class="incident-btn" data-msg="景點臨時關閉，請根據目前行程提供應變備案">🚫 景點關閉</button>
          <button class="incident-btn" data-msg="遇到交通延誤，請根據目前行程提供應變備案">⏱ 交通延誤</button>
          <span class="incident-bar-note">正式版串接天氣 API 自動觸發</span>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
          <div class="welcome-msg">
            <div class="welcome-icon">&#9708;</div>
            <p>填寫左側旅遊資料，點「開始規劃」即可開始對話。<br>規劃完成後可繼續輸入需求，例如「把第二天改成室內活動」。</p>
          </div>
        </div>

        <!-- Input -->
        <div class="input-area">
          <textarea id="userInput" placeholder="繼續輸入需求，例如：把第二天改成室內活動…" rows="1" disabled></textarea>
          <button id="sendBtn" disabled aria-label="送出">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
